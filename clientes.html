<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUJOS OCTOPUS - Solicitar Transporte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 450px; width: 100%; border-radius: 16px; }
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 8px; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <!-- HEADER & ACTION PRINCIPALE -->
    <header class="bg-slate-800 border-b border-slate-700 px-4 py-5 shadow-xl sticky top-0 z-[1000]">
        <div class="max-w-xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-amber-500 tracking-tight">MUJOS OCTOPUS</h1>
                    <p class="text-xs text-slate-400 font-medium">Mapa de Condutores Disponíveis</p>
                </div>
                <span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider animate-pulse">
                    ● Em Tempo Real
                </span>
            </div>

            <!-- BOUTON D'ACTION PRINCIPAL TRÈS VISIBLE -->
            <button onclick="toggleFormulario()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 text-base font-black py-3 px-4 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                🚖 PROCURAR TRANSPORTE
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-6 space-y-6">

        <!-- FORMULAIRE AUTOMATIQUE DE COLLECTE D'INFORMATIONS (CACHÉ PAR DÉFAUT) -->
        <div id="form-solicitacao" class="hidden bg-slate-800 border border-amber-500/40 p-5 rounded-2xl shadow-2xl space-y-4 transition-all">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h2 class="text-sm font-bold text-amber-500 uppercase tracking-wider">📋 Detalhes da sua Viagem</h2>
                <button onclick="toggleFormulario()" class="text-slate-400 hover:text-white text-xs">Fechar ✕</button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Seu Número de Contacto:</label>
                    <input type="text" id="cli-phone" placeholder="Ex: 841234567" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-amber-500 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Onde se encontra agora? (Endereço/Bairro):</label>
                    <input type="text" id="cli-origem" placeholder="Ex: Mercado de Zimpeto, junto à paragem" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Para onde vai exatamente? (Destino):</label>
                    <input type="text" id="cli-destino" placeholder="Ex: Praça dos Combatentes, Maputo" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <button onclick="enviarSolicitacaoAutomatica()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-sm py-2.5 rounded-lg shadow transition">
                🟢 Enviar Pedido via WhatsApp
            </button>
        </div>

        <!-- CARTE DES CHAUFFEURS -->
        <div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl shadow-xl">
            <div id="map" class="shadow-inner"></div>
            <p class="text-[11px] text-slate-400 text-center mt-2.5 italic">
                Os marcadores indicam a última posição conhecida dos condutores ativos.
            </p>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-25.965, 32.583], 13);
        let marqueursChauffeurs = {};

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        async function carregarMarcadores() {
            try {
                const response = await fetch('/api/listar?_t=' + Date.now());
                const motoristas = await response.json();
                
                Object.values(marqueursChauffeurs).forEach(m => map.removeLayer(m));
                marqueursChauffeurs = {};

                if (motoristas.length === 0) return;

                const limitesCarte = L.featureGroup();

                motoristas.forEach(m => {
                    if (m.latitude && m.longitude) {
                        const emoji = m.tipo === "moto" ? "🏍️" : "🛺";
                        const col = m.tipo === "moto" ? "#ff6b00" : "#00cc44";

                        const marker = L.circleMarker([m.latitude, m.longitude], {
                            radius: 8,
                            fillColor: col,
                            color: "#ffffff",
                            weight: 2,
                            fillOpacity: 0.95
                        }).addTo(map);

                        marker.bindPopup(`
                            <div class="p-0.5 text-center">
                                <b class="text-white text-xs">${emoji} DISPONÍVEL</b>
                            </div>
                        `);

                        marqueursChauffeurs[m.id_doc || m.telephone] = marker;
                        limitesCarte.addLayer(marker);
                    }
                });

                if (motoristas.length > 0) {
                    map.fitBounds(limitesCarte.getBounds(), { padding: [30, 30] });
                }
            } catch (err) {
                console.error("Erro ao carregar mapa do cliente:", err);
            }
        }

        // FONCTION DE COMMUTATION DU FORMULAIRE
        function toggleFormulario() {
            const form = document.getElementById('form-solicitacao');
            form.classList.toggle('hidden');
        }

        // COLLECTE AUTOMATIQUE ET ENVOI SUR TON WHATSAPP
        function enviarSolicitacaoAutomatica() {
            const telefone = document.getElementById('cli-phone').value.trim();
            const origem = document.getElementById('cli-origem').value.trim();
            const destino = document.getElementById('cli-destino').value.trim();

            if (!telefone || !origem || !destino) {
                alert("Por favor, preencha todos os campos para solicitar o transporte.");
                return;
            }

            // Construction du message structuré
            const mensagemFormatada = `🚨 *NOVO PEDIDO DE TRANSPORTE - MUJOS OCTOPUS*\n\n` +
                                     `📱 *Contacto do Cliente:* ${telefone}\n` +
                                     `📍 *Onde está:* ${origem}\n` +
                                     `🏁 *Para onde vai:* ${destino}`;

            // Remplace par ton numéro WhatsApp commercial Mujos Octopus (avec l'identifiant pays 258)
            const tonNumeroWhatsApp = "258856113036"; 
            
            const urlWhatsapp = `https://wa.me/${tonNumeroWhatsApp}?text=${encodeURIComponent(mensagemFormatada)}`;
            window.open(urlWhatsapp, '_blank');
        }

        // Rafraîchissement automatique toutes les 30 secondes
        carregarMarcadores();
        setInterval(carregarMarcadores, 30000);
    </script>
</body>
    </html>
