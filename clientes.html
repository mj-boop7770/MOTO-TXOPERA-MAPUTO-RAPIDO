<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTO & TXOPELA - Pedir Viagem</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; max-width: 400px; width: 100%; }
        h2 { color: #2c3e50; }
        .subtitle { color: #7f8c8d; font-size: 14px; font-weight: bold; margin-top: 5px; }
        .lista-motoristas { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #f1c40f; display: flex; flex-direction: column; gap: 10px; }
        .card.txopela { border-left-color: #3498db; } /* Bleu pour les Txopelas, Jaune pour les Motos */
        .info-row { display: flex; justify-content: space-between; align-items: center; }
        .nome { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; background: #f1c40f; color: #2c3e50; }
        .card.txopela .badge { background: #3498db; color: white; }
        .matricula { color: #7f8c8d; font-size: 14px; }
        .btn-call { background: #2ecc71; color: white; text-decoration: none; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .no-data { text-align: center; color: #7f8c8d; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <h2>MOTO & TXOPELA</h2>
    <div class="subtitle">Chamar um Motorista Rápido</div>
</div>

<div class="lista-motoristas" id="lista">
    <div class="no-data">A carregar motoristas disponíveis...</div>
</div>

<script>
    // Fonction magique pour aller chercher les chauffeurs dans notre API Octopus
    async function carregarMotoristas() {
        const listaDiv = document.getElementById('lista');
        
        try {
            const response = await fetch('/api/listar');
            const motoristas = await response.json();
            
            if (motoristas.length === 0) {
                listaDiv.innerHTML = '<div class="no-data">Nenhum motorista disponível no momento. 😔</div>';
                return;
            }
            
            listaDiv.innerHTML = ''; // On vide le message de chargement
            
            motoristas.forEach(moto => {
                const isTxopela = moto.tipo === 'txopela';
                const card = document.createElement('div');
                card.className = `card ${isTxopela ? 'txopela' : ''}`;
                
                card.innerHTML = `
                    <div class="info-row">
                        <span class="nome">${moto.nom}</span>
                        <span class="badge">${moto.tipo}</span>
                    </div>
                    <div class="matricula">Matrícula: <strong>${moto.plaque}</strong></div>
                    <a href="tel:${moto.telephone}" class="btn-call">📞 Chamar (9${moto.telephone.substring(1)})</a>
                `;
                listaDiv.appendChild(card);
            });
            
        } catch (error) {
            listaDiv.innerHTML = '<div class="no-data">Erro ao carregar o sistema Octopus.</div>';
        }
    }

    // On lance le chargement dès que la page s'ouvre
    carregarMotoristas();
</script>

</body>
      </html>
