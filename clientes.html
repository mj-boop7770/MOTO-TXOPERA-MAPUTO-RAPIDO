<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUJOS OCTOPUS - Solicitar Transporte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 16px; }
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 8px; padding: 4px; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <header class="bg-slate-800 border-b border-slate-700 px-4 py-5 shadow-xl sticky top-0 z-[1000]">
        <div class="max-w-xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-amber-500 tracking-tight">MUJOS OCTOPUS</h1>
                    <p class="text-xs text-slate-400 font-medium">Carte des chauffeurs disponibles</p>
                </div>
                <span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider animate-pulse">
                    ● EN TEMPS RÉEL
                </span>
            </div>

            <button onclick="solicitarTransporteImediato()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 text-base font-black py-3.5 px-4 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2 tracking-wide">
                🚖 CHERCHEZ UN TRANSPORT
            </button>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-6">
        <div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl shadow-xl">
            <div id="map" class="shadow-inner"></div>
            <p class="text-[11px] text-slate-400 text-center mt-2.5 italic">
                Os marcadores indicam a posição dos condutores livres mais próximos de si. Clique num marcador para ver os detalhes.
            </p>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-25.965, 32.583], 13);
        let marqueursChauffeurs = {};
        let userLat = null;
        let userLon = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // Obter geolocalização do cliente para cálculo de distância
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                userLat = position.coords.latitude;
                userLon = position.coords.longitude;
                
                // Marcador do próprio cliente na carte
                L.circleMarker([userLat, userLon], {
                    radius: 6,
                    fillColor: "#3b82f6",
                    color: "#ffffff",
                    weight: 2,
                    fillOpacity: 1
                }).addTo(map).bindPopup("<b class='text-white text-xs'>Sua Posição</b>");
                
                carregarMarcadores();
            }, () => {
                carregarMarcadores();
            });
        } else {
            carregarMarcadores();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return (R * c).toFixed(2);
        }

        async function carregarMarcadores() {
            try {
                const response = await fetch('/api/listar?_t=' + Date.now());
                const motoristas = await response.json();
                
                Object.values(marqueursChauffeurs).forEach(m => map.removeLayer(m));
                marqueursChauffeurs = {};

                if (motoristas.length === 0) return;

                const limitesCarte = L.featureGroup();

                motoristas.forEach(m => {
                    if (m.latitude && m.longitude) {
                        const emoji = m.tipo === "moto" ? "🏍️" : "🛺";
                        const col = m.tipo === "moto" ? "#ff6b00" : "#00cc44";

                        const marker = L.circleMarker([m.latitude, m.longitude], {
                            radius: 8,
                            fillColor: col,
                            color: "#ffffff",
                            weight: 2,
                            fillOpacity: 0.95
                        }).addTo(map);

                        // Texto de distância original
                        let textoDistancia = "Distância: -- km";
                        if (userLat && userLon) {
                            const d = calcularDistancia(userLat, userLon, m.latitude, m.longitude);
                            textoDistancia = `A cerca de <b>${d} km</b> de si`;
                        }

                        // RETOUR AU POPUP D'ORIGINE : Simple, propre, sans coupure HTML
                        marker.bindPopup(`
                            <div style="color: white; font-family: sans-serif;">
                                <b style="font-size: 14px; text-transform: uppercase; display: block; margin-bottom: 4px;">${emoji} ${m.nom || 'Condutor'}</b>
                                <span style="font-size: 12px; color: #94a3b8; display: block;">Plaque: ${m.plaque || 'Sem Placa'}</span>
                                <div style="font-size: 12px; color: #f59e0b; font-weight: 600; margin-top: 6px; border-top: 1px solid #334155; padding-top: 4px;">
                                    ${textoDistancia}
                                </div>
                            </div>
                        `);

                        marqueursChauffeurs[m.id_doc || m.telephone] = marker;
                        limitesCarte.addLayer(marker);
                    }
                });

                if (motoristas.length > 0) {
                    map.fitBounds(limitesCarte.getBounds(), { padding: [40, 40] });
                }
            } catch (err) {
                console.error("Erro ao carregar mapa do cliente:", err);
            }
        }

        // FUNÇÃO WHATSAPP COM SUCESSO
        function solicitarTransporteImediato() {
            const tonNumeroWhatsApp = "258856113036";
            
            const mensagem = 
                "Olá! Preciso de um transporte, por favor.\n\n" +
                "Aqui estão as minhas informações:\n" +
                "📍 Onde estou: (Escreva o seu endereço ou ponto de referência)\n" +
                "🏁 Para onde vou: (Escreva o seu destino)\n" +
                "📱 Meu número de telefone: (Escreva o seu contacto)\n\n" +
                "Aguardo o vosso contacto. Obrigado!";

            window.open(`https://wa.me/${tonNumeroWhatsApp}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }

        // Atualização automática em tempo real
        setInterval(carregarMarcadores, 30000);
    </script>
</body>
    </html>
