<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUJOS OCTOPUS - Sistema Geral</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 480px; width: 100%; border-radius: 16px; }
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 8px; }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased pb-20">

    <div id="view-cliente" class="space-y-4">
        <header class="bg-slate-800 border-b border-slate-700 px-4 py-5 shadow-xl sticky top-0 z-[1000]">
            <div class="max-w-xl mx-auto flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-black text-amber-500 tracking-tight">MUJOS OCTOPUS</h1>
                        <p class="text-xs text-slate-400 font-medium">Carte des chauffeurs disponibles</p>
                    </div>
                    <span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">
                        ● EN TEMPS RÉEL
                    </span>
                </div>

                <button onclick="solicitarTransporteImediato()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 text-base font-black py-3.5 px-4 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2 tracking-wide">
                    🚖 CHERCHEZ UN TRANSPORT
                </button>
            </div>
        </header>

        <main class="max-w-xl mx-auto px-4">
            <div class="bg-slate-800 border border-slate-700 p-3 rounded-2xl shadow-xl">
                <div id="map" class="shadow-inner"></div>
                <p class="text-[11px] text-slate-400 text-center mt-2.5 italic">
                    Clique num marcador para ver o contacto e a placa do condutor.
                </p>
            </div>
        </main>
    </div>

    <div id="view-motorista" class="hidden max-w-xl mx-auto px-4 py-6 space-y-4">
        <header class="border-b border-slate-700 pb-3">
            <h1 class="text-2xl font-black text-emerald-500 tracking-tight">PAINEL DO CONDUTOR</h1>
            <p class="text-xs text-slate-400">Atualize a sua localização aqui</p>
        </header>
        
        <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl shadow-xl space-y-4">
            <p class="text-sm text-slate-300">Ao ativar esta opção, a sua posição será enviada em tempo real para o mapa dos clientes.</p>
            <button onclick="alert('Localização partilhada com sucesso!')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow transition">
                📡 ATIVAR LOCALIZAÇÃO EM TEMPO REAL
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 py-3 px-6 shadow-2xl flex justify-around z-[2000]">
        <button onclick="mudarAba('cliente')" id="btn-tab-cliente" class="flex flex-col items-center gap-1 text-amber-500 font-bold text-xs">
            <span>🗺️</span>
            <span>Ver Mapa (Cliente)</span>
        </button>
        <button onclick="mudarAba('motorista')" id="btn-tab-motorista" class="flex flex-col items-center gap-1 text-slate-400 font-bold text-xs">
            <span>🚗</span>
            <span>Sou Condutor</span>
        </button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-25.965, 32.583], 13);
        let marqueursChauffeurs = {};

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        async function carregarMarcadores() {
            try {
                const response = await fetch('/api/listar?_t=' + Date.now());
                const motoristas = await response.json();
                
                Object.values(marqueursChauffeurs).forEach(m => map.removeLayer(m));
                marqueursChauffeurs = {};

                motoristas.forEach(m => {
                    if (m.latitude && m.longitude) {
                        const emoji = m.tipo === "moto" ? "🏍️" : "🛺";
                        const col = m.tipo === "moto" ? "#ff6b00" : "#00cc44";

                        const marker = L.circleMarker([m.latitude, m.longitude], {
                            radius: 8,
                            fillColor: col,
                            color: "#ffffff",
                            weight: 2,
                            fillOpacity: 0.95
                        }).addTo(map);

                        // RETOUR À LA BASE : L'ancien popup propre avec Nom, Contact et Plaque
                        marker.bindPopup(`
                            <div class="p-1">
                                <b class="text-white text-sm block uppercase">${emoji} ${m.nom || 'Condutor'}</b>
                                <p class="text-xs text-amber-500 font-bold mt-0.5">📱 Contacto: ${m.telephone || 'Sem Número'}</p>
                                <p class="text-xs text-slate-400 mt-0.5">Placa: ${m.plaque || 'Sem Placa'}</p>
                            </div>
                        `);

                        marqueursChauffeurs[m.id_doc || m.telephone] = marker;
                    }
                });
            } catch (err) {
                console.error("Erro ao carregar mapa:", err);
            }
        }

        // FONCTION WHATSAPP PRÉ-ÉCRITE POUR LA CONFIANCE
        function solicitarTransporteImediato() {
            const tonNumeroWhatsApp = "258856113036";
            
            const mensagem = 
                "Olá! Preciso de um transporte, por favor.\n\n" +
                "Aqui estão as minhas informações:\n" +
                "📍 Onde estou: (Escreva o seu endereço ou ponto de referência)\n" +
                "🏁 Para onde vou: (Escreva o seu destino)\n" +
                "📱 Meu número de telefone: (Escreva o seu contacto)\n\n" +
                "Aguardo o vosso contacto. Obrigado!";

            window.open(`https://wa.me/${tonNumeroWhatsApp}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }

        // LOGIQUE DE BASCULEMENT DE PAGE (CLIENTE <-> MOTORISTA)
        function mudarAba(aba) {
            const viewCliente = document.getElementById('view-cliente');
            const viewMotorista = document.getElementById('view-motorista');
            const btnCliente = document.getElementById('btn-tab-cliente');
            const btnMotorista = document.getElementById('btn-tab-motorista');

            if (aba === 'cliente') {
                viewCliente.classList.remove('hidden');
                viewMotorista.classList.add('hidden');
                btnCliente.className = "flex flex-col items-center gap-1 text-amber-500 font-bold text-xs";
                btnMotorista.className = "flex flex-col items-center gap-1 text-slate-400 font-bold text-xs";
                setTimeout(() => map.invalidateSize(), 200); // Recalcule la carte pour éviter les bugs d'affichage
            } else {
                viewCliente.classList.add('hidden');
                viewMotorista.classList.remove('hidden');
                btnCliente.className = "flex flex-col items-center gap-1 text-slate-400 font-bold text-xs";
                btnMotorista.className = "flex flex-col items-center gap-1 text-emerald-500 font-bold text-xs";
            }
        }

        carregarMarcadores();
        setInterval(carregarMarcadores, 30000);
    </script>
</body>
            </html>
