<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haulzao-2 - Encontre seu Transporte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* La carte prend maintenant tout l'espace disponible proprement */
        #map { height: calc(100vh - 110px); width: 100%; }
        /* Style personnalisé pour les popups */
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: white;
            border-radius: 12px;
            padding: 4px;
        }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-900">

    <header class="bg-amber-500 text-white px-4 py-3 shadow-md sticky top-0 z-[1000]">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight">HAULZAO-2 MAPUTO</h1>
                <p class="text-xs text-amber-100 font-medium">Motes & Txopelas em tempo real</p>
            </div>
            <div class="flex items-center gap-2">
                <a href="https://wa.me/258856113036?text=Ol%C3%A1%20Haulzao-2%21%20Preciso%20de%20ajuda%20com%20um%20transporte." target="_blank" class="bg-emerald-650 hover:bg-emerald-700 bg-emerald-600 text-white text-xs font-black px-3 py-2 rounded-lg transition shadow flex items-center gap-1">
                    💬 Suporte
                </a>
                <a href="index.html" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-2 rounded-lg transition">
                    ➔
                </a>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 px-4 py-2 text-sm shadow-sm flex flex-wrap justify-between items-center gap-2">
        <span class="text-slate-600 font-medium">💡 Clique num marcador para ligar ou enviar mensagem</span>
        <div class="flex gap-4 text-xs font-semibold">
            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-orange-500 rounded-full inline-block"></span> 🏍️ Moto</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full inline-block"></span> 🛺 Txopela</span>
            <span class="flex items-center gap-1"><span class="w-3 h-3 bg-blue-500 rounded-full inline-block"></span> 🔵 Tu estás aqui</span>
        </div>
    </div>

    <div class="relative">
        <div id="map"></div>
        
        <button id="btn-location" class="absolute bottom-6 right-6 z-[1000] bg-blue-600 text-white p-3 rounded-full shadow-lg hover:bg-blue-700 active:scale-95 transition">
            📍 Minha Posição
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-25.965, 32.583], 14);
        let userMarker = null;
        let clientLat = null;
        let clientLng = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        function calcularDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return "Distância desconhecida";
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c; 
            
            if (distance < 1) {
                return `A ${Math.round(distance * 1000)} metros de ti`;
            }
            return `A ${distance.toFixed(2)} km de ti`;
        }

        function localizarCliente() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    clientLat = position.coords.latitude;
                    clientLng = position.coords.longitude;

                    map.setView([clientLat, clientLng], 15);

                    if (userMarker) {
                        userMarker.setLatLng([clientLat, clientLng]);
                    } else {
                        userMarker = L.circleMarker([clientLat, clientLng], {
                            radius: 9,
                            fillColor: "#2563eb",
                            color: "#ffffff",
                            weight: 3,
                            fillOpacity: 1
                        }).addTo(map).bindPopup("<b style='color:#ffffff;'>Tu estás aqui</b>");
                    }
                    carregarMotoristas();
                }, error => {
                    console.warn("GPS desativado pelo cliente.");
                }, { enableHighAccuracy: true });
            }
        }

        localizarCliente();
        document.getElementById('btn-location').addEventListener('click', localizarCliente);

        async function carregarMotoristas() {
            try {
                const response = await fetch('/api/listar');
                const motoristas = await response.json();

                map.eachLayer(layer => {
                    if (layer instanceof L.CircleMarker && layer !== userMarker) {
                        map.removeLayer(layer);
                    }
                });

                motoristas.forEach(m => {
                    if (m.latitude && m.longitude) {
                        const cor = m.tipo === "moto" ? "#f97316" : "#22c55e";
                        const iconeEmoji = m.tipo === "moto" ? "🏍️" : "🛺";

                        const textoDistancia = (clientLat && clientLng) 
                            ? calcularDistance(clientLat, clientLng, m.latitude, m.longitude)
                            : "Activa o teu GPS para ver a distância";

                        // Message WhatsApp formaté pour ton futur bot
                        const msgWhatsapp = encodeURIComponent(
                            `Olá! Preciso de um transporte, por favor.\n\n📍 Destino: (Escreva para onde vai)\n📱 Contacto: ${m.telephone}`
                        );

                        // Message SMS brut par défaut
                        const msgSMS = encodeURIComponent("Olá! Vi que estás disponível no Haulzao-2. Preciso de um transporte.");

                        const marker = L.circleMarker([m.latitude, m.longitude], {
                            radius: 12,
                            fillColor: cor,
                            color: "#ffffff",
                            weight: 2,
                            fillOpacity: 0.9
                        }).addTo(map);

                        const popupContent = `
                            <div class="p-1 w-[200px]">
                                <h3 class="text-base font-bold flex items-center gap-1">${iconeEmoji} ${m.nom.toUpperCase()}</h3>
                                <p class="text-xs text-slate-300 mt-1">Placa: <span class="bg-slate-700 px-1.5 py-0.5 rounded font-mono text-white text-[11px]">${m.plaque}</span></p>
                                <p class="text-xs text-amber-400 font-semibold mt-1.5 mb-2">📍 ${textoDistancia}</p>
                                
                                <div class="flex flex-col gap-2 mt-3">
                                    <a href="tel:${m.telephone}" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-center font-bold text-xs py-2 px-3 rounded-lg shadow transition flex items-center justify-center gap-1">
                                        📞 Ligar para Condutor
                                    </a>
                                    
                                    <div class="flex gap-2">
                                        <a href="https://wa.me/${m.telephone}?text=${msgWhatsapp}" target="_blank" class="w-1/2 bg-green-500 hover:bg-green-600 text-white text-center font-bold text-xs py-2 px-1 rounded-lg shadow transition flex items-center justify-center gap-0.5">
                                            💬 WhatsApp
                                        </a>
                                        <a href="sms:${m.telephone}?body=${msgSMS}" class="w-1/2 bg-blue-500 hover:bg-blue-600 text-white text-center font-bold text-xs py-2 px-1 rounded-lg shadow transition flex items-center justify-center gap-0.5">
                                            ✉️ Enviar SMS
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                    }
                });
            } catch (err) {
                console.error("Erro ao carregar dados do Haulzao-2:", err);
            }
        }

        setInterval(carregarMotoristas, 30000);
    </script>
</body>
</html>
