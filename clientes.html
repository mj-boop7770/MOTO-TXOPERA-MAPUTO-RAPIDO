<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haulzao-2 - Mapa de Motoristas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #111827; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1f2937; padding: 15px; text-align: center; border-bottom: 3px solid #fbbf24; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; }
        h1 { color: #fbbf24; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: #9ca3af; font-size: 12px; margin-top: 2px; }
        #map { flex: 1; width: 100%; }
        
        .leaflet-popup-content-wrapper { background: #1f2937 !important; color: white !important; border-radius: 12px; padding: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: #1f2937 !important; }
        .popup-container { display: flex; flex-direction: column; gap: 8px; min-width: 190px; }
        .popup-title { font-weight: bold; font-size: 16px; color: #fbbf24; border-bottom: 1px solid #374151; padding-bottom: 4px; }
        .popup-meta { color: #e5e7eb; font-size: 13px; }
        .btn-call { background: #10b981; color: white !important; text-decoration: none; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 6px; display: block; transition: 0.2s; }
        .btn-call:hover { background: #059669; }
    </style>
</head>
<body>

<header>
    <h1>MOTO & TXOPELA MAPUTO</h1>
    <div class="subtitle">Haulzao-2 - Geolocalização Disponível em Tempo Real</div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([-25.9692, 32.5732], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    async function carregarMapa() {
        try {
            const response = await fetch('/api/listar');
            const motoristas = await response.json();
            
            motoristas.forEach(moto => {
                if (moto.latitude && moto.longitude) {
                    const marker = L.marker([moto.latitude, moto.longitude]).addTo(map);
                    
                    const popupContent = `
                        <div class="popup-container">
                            <div class="popup-title">${moto.nom}</div>
                            <div class="popup-meta">Veículo: <b>${moto.tipo.toUpperCase()}</b></div>
                            <div class="popup-meta">🆔 Matrícula: <b>${moto.plaque}</b></div>
                            <a href="tel:${moto.telephone}" class="btn-call">📞 Chamar Motorista</a>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                }
            });
        } catch (error) {
            console.error("Erro ao conectar com Haulzao-2:", error);
        }
    }

    carregarMapa();
</script>

</body>
</html>
